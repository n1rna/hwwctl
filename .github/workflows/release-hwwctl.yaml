name: Release hwwctl

# Two ways to fire this:
#
# 1. Push a tag of the form `hwwctl-vX.Y.Z` — the workflow checks
#    out at that tag and reads the version off `crates/hwwctl/Cargo.toml`.
# 2. Manually via the Actions UI (`workflow_dispatch`). The optional
#    `tag` input lets you cut a release from any ref without first
#    pushing a tag — useful for prereleases.
#
# Output: a GitHub release with two asset pairs attached:
#
#   * hwwctl-linux-x86_64.tar.gz             (+ .sha256)  — the hwwctl binary
#   * hwwctl-bitbox02-linux-x86_64.tar.gz    (+ .sha256)  — BitBox02 simulator bundle
#
# Both build on `ubuntu-24.04` so their glibc minimums match the
# expectation downstream consumers (e.g. sigvault e2e) already pin to.

on:
  push:
    tags:
      - 'hwwctl-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. hwwctl-v0.1.1). Created if it does not exist.'
        required: true
        default: 'hwwctl-v0.1.1-dev'
      prerelease:
        description: 'Mark as prerelease?'
        required: false
        type: boolean
        default: true

permissions:
  contents: write # required to create releases + upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Meta: resolve and validate the tag once so binary + bundle jobs
  # share a single source of truth without depending on each other.
  # Cheap (~10s) and keeps the build jobs runnable in parallel.
  # ---------------------------------------------------------------------------
  meta:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag + version
        id: resolve
        run: |
          set -euo pipefail
          # Prefer the workflow_dispatch input; fall back to the
          # pushed ref name (which is the tag for `on: push: tags`).
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Tags must follow hwwctl-vX.Y.Z; extract the X.Y.Z part.
          if [[ "$TAG" =~ ^hwwctl-v([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::tag '$TAG' does not match hwwctl-vX.Y.Z[-suffix]"
            exit 1
          fi
          # Cross-check against Cargo.toml so we can't ship a binary
          # whose --version string disagrees with the release tag.
          CARGO_VERSION=$(grep -m1 '^version' crates/hwwctl/Cargo.toml | cut -d'"' -f2)
          # Strip any prerelease suffix off the tag's version for
          # the Cargo comparison (Cargo.toml carries only X.Y.Z).
          TAG_CORE="${VERSION%%-*}"
          if [ "$TAG_CORE" != "$CARGO_VERSION" ]; then
            echo "::error::tag version core ($TAG_CORE) does not match crates/hwwctl/Cargo.toml ($CARGO_VERSION). Bump Cargo.toml first."
            exit 1
          fi
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VERSION)"

  # ---------------------------------------------------------------------------
  # hwwctl binary (Linux x86_64)
  # ---------------------------------------------------------------------------
  build-linux-x86_64:
    needs: meta
    # Pinned (was ubuntu-latest) so the binary's glibc minimum stays
    # predictable. ubuntu-latest silently rolls forward and would
    # break downstream pins.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-hwwctl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-release-hwwctl-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev libudev-dev pkg-config libclang-dev

      - name: Build hwwctl (release)
        run: cargo build --release -p hwwctl

      - name: Strip + package
        run: |
          set -euxo pipefail
          mkdir -p dist
          strip target/release/hwwctl
          tar -C target/release -czf dist/hwwctl-linux-x86_64.tar.gz hwwctl
          ( cd dist && sha256sum hwwctl-linux-x86_64.tar.gz > hwwctl-linux-x86_64.tar.gz.sha256 )
          ls -la dist
          ./target/release/hwwctl --version

      - name: Upload build artifacts (workflow artifact, not release)
        uses: actions/upload-artifact@v4
        with:
          name: hwwctl-linux-x86_64
          path: dist/*

  # ---------------------------------------------------------------------------
  # BitBox02 simulator bundle (Linux x86_64). Built from
  # BitBoxSwiss/bitbox02-firmware at the pinned ref so the binary's
  # behavior is reproducible across releases. Cached by firmware ref
  # + build script hash — only rebuilds when one of those changes.
  # Cache key is shared with hwwctl.yaml smoke workflow so a green
  # smoke run primes this job's cache (and vice versa).
  # ---------------------------------------------------------------------------
  build-bitbox02-bundle:
    needs: meta
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Resolve bitbox02-firmware ref
        id: bb02-ref
        # Bump this string to pick up a newer simulator. The cache
        # key includes it, so bumping forces a rebuild on the next
        # release.
        run: echo "ref=firmware/v9.23.1" >> "$GITHUB_OUTPUT"

      - name: Try restoring cached bundle
        id: bundle-cache
        uses: actions/cache@v4
        with:
          path: hwwctl-bitbox02-linux-x86_64.tar.gz
          # MUST stay in sync with .github/workflows/hwwctl.yaml's
          # `bundle-cache` step so the two workflows share a hot
          # cache. If you change the key shape here, change it
          # there too.
          key: bb02-bundle-${{ steps.bb02-ref.outputs.ref }}-${{ hashFiles('scripts/build/bitbox02.sh') }}

      - name: Checkout bitbox02-firmware
        if: steps.bundle-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: BitBoxSwiss/bitbox02-firmware
          path: bitbox02-firmware
          submodules: recursive
          fetch-depth: 0
          ref: ${{ steps.bb02-ref.outputs.ref }}

      - name: Install system dependencies
        if: steps.bundle-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++ protobuf-compiler \
            libusb-1.0-0-dev libudev-dev pkg-config \
            python3 python3-pip libcmocka-dev libhidapi-dev libprotobuf-dev \
            libclang-dev jq

      - uses: dtolnay/rust-toolchain@stable
        if: steps.bundle-cache.outputs.cache-hit != 'true'

      - name: Install Rust tools for BitBox02 firmware build
        if: steps.bundle-cache.outputs.cache-hit != 'true'
        run: |
          BB_TOOLCHAIN=$(grep 'channel' bitbox02-firmware/src/rust/rust-toolchain.toml | cut -d'"' -f2)
          rustup toolchain install "${BB_TOOLCHAIN}"
          rustup component add rust-src --toolchain "${BB_TOOLCHAIN}-x86_64-unknown-linux-gnu"
          cargo install cbindgen bindgen-cli
          # --manifest-path (not cd) so cargo doesn't walk up to our
          # workspace; [workspace] exclude in our root manifest
          # covers the rest.
          cargo build --release --manifest-path bitbox02-firmware/tools/prost-build-proto/Cargo.toml
          cp bitbox02-firmware/tools/prost-build-proto/target/release/prost-build-proto ~/.cargo/bin/

      - name: Build BitBox02 simulator bundle
        if: steps.bundle-cache.outputs.cache-hit != 'true'
        env:
          BUNDLE_VERSION: ${{ needs.meta.outputs.version }}
        # BUNDLE_VERSION ends up in the embedded bundle-info.json
        # (NOT the runtime manifest.json — that's written at
        # install time by BundleManager::download). Stamp it with
        # the release tag's version so the artifact is traceable.
        run: FIRMWARE_DIR=bitbox02-firmware ./scripts/build/bitbox02.sh

      - name: Generate SHA256 sidecar
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp hwwctl-bitbox02-linux-x86_64.tar.gz dist/
          ( cd dist && sha256sum hwwctl-bitbox02-linux-x86_64.tar.gz > hwwctl-bitbox02-linux-x86_64.tar.gz.sha256 )
          ls -la dist

      - name: Upload build artifacts (workflow artifact, not release)
        uses: actions/upload-artifact@v4
        with:
          name: hwwctl-bitbox02-linux-x86_64
          path: dist/*

  # ---------------------------------------------------------------------------
  # Publish: pull both artifact sets, attach to the same release.
  # ---------------------------------------------------------------------------
  publish:
    needs:
      - meta
      - build-linux-x86_64
      - build-bitbox02-bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download hwwctl binary artifact
        uses: actions/download-artifact@v4
        with:
          name: hwwctl-linux-x86_64
          path: dist

      - name: Download BitBox02 bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: hwwctl-bitbox02-linux-x86_64
          path: dist

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          VERSION: ${{ needs.meta.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euxo pipefail
          ls -la dist
          # Build release notes line-by-line so multi-line markdown
          # doesn't fight YAML block-scalar indentation. (Earlier
          # inline `--notes "...multi-line..."` and a heredoc both
          # broke either the YAML or the markdown — see
          # hwwctl-v0.1.1 first attempt.)
          {
            echo "hwwctl release \`${VERSION}\` (Linux x86_64)."
            echo ""
            echo "Assets:"
            echo ""
            echo "- \`hwwctl-linux-x86_64.tar.gz\` — the hwwctl binary."
            echo "- \`hwwctl-bitbox02-linux-x86_64.tar.gz\` — BitBox02 simulator bundle. Extract with \`--strip-components=1\` into \`~/.hwwctl/bundles/bitbox02/\`. Ships a \`manifest.json\` so it's install-ready."
            echo ""
            echo "Each asset has a matching \`.sha256\` sidecar."
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md
          # Idempotent: if the release already exists (e.g. tag was
          # pushed then re-run via dispatch), upload --clobber the
          # assets onto it. Otherwise create it.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets with --clobber"
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            FLAGS=()
            if [ "${PRERELEASE:-false}" = "true" ]; then FLAGS+=(--prerelease); fi
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "hwwctl $VERSION" \
              --notes-file /tmp/release-notes.md \
              "${FLAGS[@]}" \
              dist/*
          fi
          echo "Release URL:"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json url --jq .url
